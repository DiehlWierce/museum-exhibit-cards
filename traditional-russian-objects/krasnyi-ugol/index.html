    <title>Красный угол</title>
    <link rel="stylesheet" href="../styles.css" />

<body>
    <img src="image.jpg" alt="Красный угол" />

    <div class="audio-block">
        <label for="voice">🎙️ Чтение текста</label>
        <audio id="voice" src="voice.mp3" controls></audio>

    <h1>Красный угол</h1>

    <div class="text">
        <p><strong>"Красный угол в русской избе".</strong> Название это происходит от старославянского "красень", что
            означает - "красивый", "святой". Почётное место в избе, в котором находились иконы и стоял стол, славя́не
            называли Кут. Обычно он был обращён на юго-восток.</p>
    </div>

    <div id="qrcode" style="width: 128px; height: 128px;"></div>
